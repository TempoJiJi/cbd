<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Portfolio - Professional Developer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Professional Full Stack Developer Portfolio" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link href="css/plugins.css" rel="stylesheet" />
    <link href="style.css" rel="stylesheet" />
  </head>

  <body class="light" data-barba="wrapper">
    <div id="mouseCursor" class="dot"></div>

    <div id="page">
      <div class="menu-overlay"></div>

      <!-- Site Header -->
      <div id="header" class="site-header fixed light blend">
        <div class="header-wrapper wrapper-full">
          <div class="c-col-4">
            <div class="nayla-button">
              <a href="#home">HOME</a>
            </div>
          </div>

          <div class="c-col-4 align-center">
            <div class="nayla-button">
              <a href="#about">ABOUT</a>
            </div>
          </div>

          <div class="c-col-4 align-right">
            <div class="nayla-button">
              <a href="#works">WORKS</a>
            </div>
          </div>
        </div>
      </div>
      <!--/ Site Header -->

      <main id="primary" class="site-main" data-barba="container">
        <div id="content" class="page-content">
          <!-- Hero Banner -->
          <div class="section fullscreen" style="height: 100vh; padding: 0; margin: 0; position: relative;">
            <!-- Full screen background image -->
            <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;">
              <img 
                src="https://images.pexels.com/photos/3861969/pexels-photo-3861969.jpeg"
                alt="Hero Background" 
                style="width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7);"
              />
            </div>

            <!-- Content overlay -->
            <div style="position: relative; z-index: 2; height: 100%; display: flex; align-items: center;">
              <div class="wrapper-full" style="width: 100%;">
                <div class="c-col-12">
                  <div class="text-wrapper" style="color: white; max-width: 800px;">
                    <p class="text-h6 has-anim-text wordsUp" 
                       style="color: #4A90E2; font-weight: 500; letter-spacing: 3px; margin-bottom: 20px;">
                      FULL STACK DEVELOPER
                    </p>
                    
                    <h1 class="text-h1 has-anim-text charsLeft" 
                        style="color: white; margin-bottom: 30px; font-size: 72px; line-height: 1.1;">
                      Crafting Digital<br/>Experiences
                    </h1>
                    
                    <p class="text-h6 has-anim-text linesUp" 
                       style="color: rgba(255,255,255,0.9); max-width: 600px; line-height: 1.8; margin-bottom: 40px;">
                      Transforming ideas into elegant, scalable solutions through clean code and modern architecture.
                    </p>

                    <div class="nayla-button has-anim fadeUp" style="margin-bottom: 60px;">
                      <a href="#works" 
                         style="display: inline-block; padding: 18px 40px; background: #4A90E2; 
                                color: white; border-radius: 4px; text-decoration: none; 
                                font-size: 18px; transition: all 0.3s ease;">
                        View My Work
                      </a>
                    </div>

                    <div class="has-anim fadeUp" style="opacity: 0.9;">
                      <p class="text-h6" style="letter-spacing: 2px;">
                        <span style="color: #4A90E2">●</span> JavaScript 
                        <span style="color: #4A90E2">●</span> TypeScript 
                        <span style="color: #4A90E2">●</span> React 
                        <span style="color: #4A90E2">●</span> Node.js 
                        <span style="color: #4A90E2">●</span> Python
                      </p>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Scroll indicator -->
            <div style="position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 2;">
              <div class="nayla-button scroll-button" data-scroll-to="#content"
                   style="color: white; opacity: 0.7; cursor: pointer;">
                <span class="material-icons" style="font-size: 40px; animation: bounce 2s infinite;">
                  keyboard_arrow_down
                </span>
              </div>
            </div>
          </div>
          <!--/ Hero Banner -->
        </div>
      </main>
    </div>

    <script src="js/jquery.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/barba.min.js"></script>
    <script src="js/gsap.js"></script>
    <script src="js/scripts.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Portfolio - Professional Developer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Professional Full Stack Developer Portfolio" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link href="css/plugins.css" rel="stylesheet" />
    <link href="style.css" rel="stylesheet" />
  </head>

  <body class="light" data-barba="wrapper">
    <div id="mouseCursor" class="dot"></div>

    <div id="page">
      <div class="menu-overlay"></div>

      <!-- Site Header -->
      <div id="header" class="site-header fixed dark blend">
        <div class="header-wrapper wrapper-full">
          <div class="c-col-4">
            <div class="nayla-button">
              <a href="#home">HOME</a>
            </div>
          </div>

          <div class="c-col-4 align-center">
            <div class="nayla-button">
              <a href="#about">ABOUT</a>
            </div>
          </div>

          <div class="c-col-4 align-right">
            <div class="nayla-button">
              <a href="#works">WORKS</a>
            </div>
          </div>
        </div>
      </div>
      <!--/ Site Header -->

      <main id="primary" class="site-main" data-barba="container">
        <div id="content" class="page-content">
          <!-- Hero Banner -->
          <div class="section fullscreen light" style="padding-top: 75px">
            <div class="section-background">
              <div class="single-image has-anim scaleIn" data-pin="true" data-start=".2" style="height: 100vh">
                <img 
                  alt="Hero Background" 
                  style="height: 100vh; object-fit: cover; filter: brightness(0.9);" 
                  src="https://images.pexels.com/photos/7135121/pexels-photo-7135121.jpeg"
                />
              </div>
            </div>

            <div class="wrapper-full">
              <div class="c-col-12">
                <div class="text-wrapper mobile-align-center" style="margin-top: 15vh;">
                  <p class="text-h6 has-anim-text wordsUp" style="margin-bottom: 20px; color: #4A90E2; font-weight: 500; letter-spacing: 2px;">
                    FULL STACK DEVELOPER
                  </p>
                  <p class="md-title has-anim-text charsLeft" style="--mobileFontSize: 60px; margin-bottom: 30px; font-weight: 500;">
                    Building Digital<br />Solutions
                  </p>
                  <p class="text-h6 has-anim-text wordsUp" style="color: rgba(0,0,0,0.7); max-width: 600px; line-height: 1.6;">
                    Specialized in creating elegant, efficient, and scalable web applications using modern technologies and best practices.
                  </p>
                </div>
              </div>

              <div class="c-col-12" style="margin-top: 40px;">
                <div class="text-wrapper mobile-align-center">
                  <div class="nayla-button" style="display: inline-block;">
                    <a href="#works" class="text-h6" style="padding: 15px 30px; background: #4A90E2; color: white; border-radius: 4px; text-decoration: none;">
                      View Projects
                    </a>
                  </div>
                </div>
              </div>

              <div class="c-col-12" style="margin-top: 60px;">
                <div class="text-wrapper mobile-align-center">
                  <p class="text-h6 has-anim-text wordsUp" style="color: rgba(0,0,0,0.6); letter-spacing: 1px;">
                    JavaScript • TypeScript • React • Node.js • Python
                  </p>
                </div>
              </div>
            </div>
          </div>
          <!--/ Hero Banner -->
        </div>
      </main>
    </div>

    <script src="js/jquery.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/barba.min.js"></script>
    <script src="js/gsap.js"></script>
    <script src="js/scripts.js"></script>
  </body>
</html>

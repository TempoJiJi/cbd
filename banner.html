<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Portfolio - Professional Developer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Professional Full Stack Developer Portfolio" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link href="css/plugins.css" rel="stylesheet" />
    <link href="style.css" rel="stylesheet" />
  </head>

  <body class="dark" data-barba="wrapper">
    <div id="mouseCursor" class="dot"></div>

    <div id="page">
      <div class="menu-overlay"></div>

      <!-- Site Header -->
      <div id="header" class="site-header fixed light blend">
        <div class="header-wrapper wrapper-full">
          <div class="c-col-4">
            <div class="nayla-button" data-icon="terminal">
              <a href="#home">HOME</a>
            </div>
          </div>

          <div class="c-col-4 align-center">
            <div class="nayla-button" data-icon="code">
              <a href="#about">ABOUT</a>
            </div>
          </div>

          <div class="c-col-4 align-right">
            <div class="nayla-button" data-icon="memory">
              <a href="#works">WORKS</a>
            </div>
          </div>
        </div>
      </div>
      <!--/ Site Header -->

      <main id="primary" class="site-main" data-barba="container">
        <div id="content" class="page-content">
          <!-- Hero Banner -->
          <div class="section fullscreen light" style="padding-top: 75px">
            <div class="section-background">
              <div class="single-image has-anim scaleIn" data-pin="true" data-start=".2" style="height: 100vh">
                <img 
                  alt="Hero Background" 
                  style="height: 100vh; object-fit: cover; filter: brightness(0.4) contrast(1.2);" 
                  src="https://images.pexels.com/photos/1181671/pexels-photo-1181671.jpeg" 
                />
              </div>
            </div>

            <div class="wrapper-full blend">
              <div class="c-col-12">
                <div class="text-wrapper blend mobile-align-center">
                  <p class="text-h6 has-anim-text wordsUp" style="margin-bottom: 20px; color: #64ffda; letter-spacing: 4px;">$ init --developer</p>
                  <p class="md-title has-anim-text charsLeft" style="--mobileFontSize: 60px; margin-bottom: 20px; font-family: 'DM Sans', monospace;">
                    FULL STACK<br />ENGINEER_
                  </p>
                </div>
              </div>

              <div class="c-col-4 sm-12 align-bottom mobile-align-center blend">
                <div 
                  class="nayla-circular-text counter-clockwise scroll-button" 
                  data-scroll-to="#sec1" 
                  data-height="190" 
                  data-duration="13" 
                  data-seperator="circle" 
                  data-icon="terminal"
                >
                  <h3 class="circle-text">VIEW_PROJECTS</h3>
                </div>
              </div>

              <div class="c-col-8 sm-12 align-bottom">
                <div class="text-wrapper align-right blend mobile-align-center">
                  <p class="text-h6 has-anim-text wordsUp" style="margin-bottom: 20px; color: #64ffda; letter-spacing: 4px;">
                    {SPECIALIZED_IN}
                  </p>
                  <p class="md-title has-anim-text charsLeft" style="--mobileFontSize: 60px" data-delay="1">
                    MODERN WEB<br />ARCHITECTURE
                  </p>
                </div>
              </div>

              <div class="c-col-12 align-center" style="margin-top: 40px;">
                <div class="text-wrapper blend mobile-align-center">
                  <p class="text-h6 has-anim-text wordsUp" style="color: rgba(255,255,255,0.6); font-family: monospace;">
                    [ JavaScript • TypeScript • React • Node.js • Python ]
                  </p>
                </div>
              </div>
            </div>
          </div>
          <!--/ Hero Banner -->
        </div>
      </main>
    </div>

    <script src="js/jquery.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/barba.min.js"></script>
    <script src="js/gsap.js"></script>
    <script src="js/scripts.js"></script>
  </body>
</html>
